<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VESC Tuner · Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VESC Tuner">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">VESC <b>TUNER</b></div>
        <div class="sub">Ride telemetry analysis</div>
      </div>
      <div class="sess" id="sess">
        <div class="name" id="sess-name">no session</div>
        <div class="meta" id="sess-meta">drop a session CSV</div>
      </div>
      <div class="boards" id="boards"></div>
      <nav id="nav">
        <span class="navlbl">VIEWS</span>
        <button class="navitem active" data-v="overview"><span class="dot" style="background:var(--bran)"></span>Overview</button>
        <button class="navitem" data-v="timeline"><span class="dot" style="background:var(--warning)"></span>Timeline</button>
        <button class="navitem" data-v="battery"><span class="dot" style="background:var(--highlight)"></span>Battery</button>
        <button class="navitem" data-v="imu"><span class="dot" style="background:var(--target)"></span>Balance / IMU</button>
        <span class="navlbl">ANALYSIS</span>
        <button class="navitem" data-v="compare"><span class="dot" style="background:var(--wheel)"></span>Compare A/B</button>
        <button class="navitem" data-v="histograms"><span class="dot" style="background:var(--target)"></span>Histograms</button>
        <button class="navitem" data-v="segments"><span class="dot" style="background:var(--warning)"></span>Segments</button>
        <button class="navitem" data-v="efficiency"><span class="dot" style="background:var(--teal)"></span>Efficiency</button>
        <button class="navitem" data-v="map"><span class="dot" style="background:var(--gps)"></span>Map / GPS</button>
        <button class="navitem" data-v="motor"><span class="dot" style="background:var(--bran)"></span>Motor / FOC</button>
        <button class="navitem" data-v="faults"><span class="dot" style="background:var(--error)"></span>Faults</button>
        <button class="navitem" data-v="stats"><span class="dot" style="background:var(--gps)"></span>Statistics</button>
        <span class="navlbl">TOOLS</span>
        <button class="navitem" data-v="diag"><span class="dot" style="background:var(--teal)"></span>Diagnostics</button>
        <button class="navitem" data-v="tuning"><span class="dot" style="background:var(--gps)"></span>Tuning loop</button>
        <button class="navitem" data-v="replay"><span class="dot" style="background:var(--highlight)"></span>Replay</button>
        <button class="navitem" data-v="history"><span class="dot" style="background:var(--wheel)"></span>History</button>
        <button class="navitem" data-v="live"><span class="dot" style="background:var(--error)"></span>Live</button>
      </nav>
      <div class="spacer"></div>
      <div class="tools">
        <button class="toolbtn" id="t-smooth" title="Moving-average smoothing">⌇ Smooth</button>
        <button class="toolbtn" id="t-theme" title="Toggle light/dark">◐ Theme</button>
        <button class="toolbtn" id="t-png" title="Export visible charts as PNG">⇩ PNG</button>
        <button class="toolbtn" id="t-clr" title="Clear annotation markers">⌫ Marks</button>
      </div>
      <button class="loadbtn" id="t-install" hidden style="margin-bottom:8px">⬇ Install app</button>
      <span class="navlbl" style="padding-left:14px">IMPORT</span>
      <div class="imports">
        <button class="loadbtn" id="imp-card">↑ Cardputer CSV</button>
        <button class="loadbtn" id="imp-fc">↑ Float Control</button>
        <button class="loadbtn" id="imp-floaty" disabled title="No sample data yet — coming later">↑ Floaty (soon)</button>
      </div>
      <input type="file" id="file" accept=".csv,.txt" hidden>
      <input type="file" id="board-file" accept=".csv,.txt" hidden>
    </aside>

    <main class="main" id="main"></main>
  </div>

  <div class="drop" id="drop"><div class="box"><h2>Drop session CSV</h2><p>session_NNN.csv from the Cardputer SD card</p></div></div>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script src="views2.js"></script>
  <script src="views3.js"></script>
  <script src="features.js"></script>
  <script src="boards.js"></script>
</body>
</html>
