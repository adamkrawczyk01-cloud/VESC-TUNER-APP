<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VESC Tuner · Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">VESC <b>TUNER</b></div>
        <div class="sub">Ride telemetry analysis</div>
      </div>
      <div class="sess" id="sess">
        <div class="name" id="sess-name">no session</div>
        <div class="meta" id="sess-meta">drop a session CSV</div>
      </div>
      <nav id="nav">
        <span class="navlbl">VIEWS</span>
        <button class="navitem active" data-v="overview"><span class="dot" style="background:var(--bran)"></span>Overview</button>
        <button class="navitem" data-v="timeline"><span class="dot" style="background:var(--warning)"></span>Timeline</button>
        <button class="navitem" data-v="battery"><span class="dot" style="background:var(--highlight)"></span>Battery</button>
        <button class="navitem" data-v="imu"><span class="dot" style="background:var(--target)"></span>Balance / IMU</button>
        <span class="navlbl">ANALYSIS</span>
        <button class="navitem" data-v="compare"><span class="dot" style="background:var(--wheel)"></span>Compare A/B</button>
        <button class="navitem" data-v="diag"><span class="dot" style="background:var(--teal)"></span>Diagnostics</button>
        <button class="navitem" data-v="tuning"><span class="dot" style="background:var(--gps)"></span>Tuning loop</button>
        <button class="navitem" data-v="live"><span class="dot" style="background:var(--error)"></span>Live</button>
      </nav>
      <div class="spacer"></div>
      <button class="loadbtn" id="load">↑ Load session CSV</button>
      <input type="file" id="file" accept=".csv" hidden>
    </aside>

    <main class="main" id="main"></main>
  </div>

  <div class="drop" id="drop"><div class="box"><h2>Drop session CSV</h2><p>session_NNN.csv from the Cardputer SD card</p></div></div>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="app.js"></script>
  <script src="views2.js"></script>
</body>
</html>
